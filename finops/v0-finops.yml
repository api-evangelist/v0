serviceCategory: AI
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: v0
  ServiceCategory: AI
  ProviderName: Vercel
  PublisherName: Vercel
  InvoiceIssuerName: Vercel
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: credits
  description: v0 credits consumed by chat generations, deployments, and other Platform API operations.
  unit: credit
  aggregation: sum
  dimensions:
  - account
  - workspace
  - api_key
- name: seats
  description: Active seats on Team plans.
  unit: seat
  aggregation: max
  dimensions:
  - workspace
principles:
- name: Visibility
  description: Use the Platform API rate-limits / usage endpoints and Vercel invoices to track credit burn.
- name: Allocation
  description: Allocate by API key or workspace to attribute spend to internal teams.
- name: Optimization
  description: Cache prompts, scope generations narrowly, prefer chat reuse over new chats.
- name: Accountability
  description: Designate workspace owners to monitor monthly credit consumption.
