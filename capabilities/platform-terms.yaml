    description: v0 App API — terms business capability. Self-contained, no shared references.
    resources:
    - name: terms
      path: /terms
      operations:
      - name: termsfind
        method: GET
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: terms-accept
      path: /terms/accept
      operations:
      - name: termsacceptcreate
        method: POST
        description: ''
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: Authorization
      value: '{{env.V0_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: platform-terms-rest
    port: 8080
    description: REST adapter for v0 App API — terms. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/terms
      name: terms
      description: REST surface for terms.
      operations:
      - method: GET
        name: termsfind
        description: termsfind
        call: platform-terms.termsfind
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/terms/accept
      name: terms-accept
      description: REST surface for terms-accept.
      operations:
      - method: POST
        name: termsacceptcreate
        description: termsacceptcreate
        call: platform-terms.termsacceptcreate
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-terms-mcp
    port: 9090
    transport: http
    description: MCP adapter for v0 App API — terms. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: termsfind
      description: termsfind
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: platform-terms.termsfind
      outputParameters:
      - type: object
        mapping: $.
    - name: termsacceptcreate
      description: termsacceptcreate
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-terms.termsacceptcreate
      outputParameters:
      - type: object
        mapping: $.
